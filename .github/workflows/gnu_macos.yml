name: GNU Macos

on: [push]
jobs:
  openmpi:
    name: GCC-15 + OpenMPI with persistent communications
    runs-on: macos-latest
    env:
      CC: "gcc-15"
      CXX: "g++-15"
      FC: "gfortran-15"
      DTFFT_ENABLE_LOG: "1"
    steps:
      - name: Get Requirements
        run: |
          brew install openmpi
          brew install fftw
          brew install lcov
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Debug \
            -DDTFFT_RUNNING_CICD=on \
            -DDTFFT_WITH_FFTW=on \
            -DDTFFT_BUILD_SHARED=on \
            -DDTFFT_MPI_VENDOR=openmpi \
            -DDTFFT_ENABLE_PERSISTENT_COMM=on \
            -DDTFFT_WITH_RMA=on \
            -DDTFFT_BUILD_C_CXX_API=off
          cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Install
        run: sudo cmake --install build
      - name: Test install
        working-directory: ./tests/install
        run: |
          cmake -B build -S . -Ddtfft_DIR=/usr/local/lib/cmake/dtfft/
          cmake --build build

  mpich:
    name: macOS MPICH + OpenMP
    runs-on: macos-latest
    env:
      CC: "gcc-15"
      CXX: "g++-15"
      FC: "gfortran-15"
      DTFFT_ENABLE_LOG: "1"
    steps:
      - name: Get Requirements
        run: |
          brew install mpich
          brew install lcov
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DDTFFT_BUILD_SHARED=on \
            -DDTFFT_BUILD_C_CXX_API=on \
            -DDTFFT_USE_MPI=on \
            -DDTFFT_WITH_OPENMP=on 
          cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Install
        run: sudo cmake --install build
      - name: Test install
        working-directory: ./tests/install
        run: |
          cmake -B build -S . -Ddtfft_DIR=/usr/local/lib/cmake/dtfft/
          cmake --build build

  python314_openmpi:
    name: Python tests with GCC-15 + OpenMPI
    runs-on: macos-latest
    env:
      CC: "gcc-15"
      CXX: "g++-15"
      FC: "gfortran-15"
      CMAKE_ARGS: "-DDTFFT_WITH_FFTW=on -DDTFFT_BUILD_TESTS=on"
    steps:
      - name: Get Requirements
        run: |
            brew install openmpi
            brew install fftw
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build
        run: |
          python3.14 -m venv venv
          venv/bin/pip install .
      - name: Test
        run: |
          ctest --test-dir $(find _skbuild -maxdepth 2 -name "cmake-build" -type d) --output-on-failure