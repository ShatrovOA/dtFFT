name: Build Python Wheels

on:
  push:
    branches: [development, master]
  pull_request:
  workflow_dispatch:
    inputs:
      publish_test_pypi:
        description: 'Publish to Test PyPI'
        required: false
        type: boolean
        default: false

# ── Matrix legend ──────────────────────────────────────────────────────────────
# mpi                   – MPI implementation: openmpi or mpich
#                         mpi4py is compiled from source against whichever is installed.
#                         The MPI variant is appended to the PyPI distribution name so
#                         that OpenMPI and MPICH wheels are separate packages on PyPI.
#                         Example: dtfft-fftw + openmpi → dtfft-fftw-openmpi
# config.package_name   – base PyPI distribution name (without MPI suffix)
# config.platform       – human-readable label used in the artifact name
# config.os             – GitHub-hosted runner image
# config.extra_features – comma-separated EXTRA_FEATURES value (maps to CMake flags)
# config.cupy_package   – cupy variant declared as runtime dep; empty for CPU wheels
# config.cibw_archs     – CIBW_ARCHS: arm64 | x86_64 | aarch64
# config.cibw_image     – manylinux Docker image passed to cibuildwheel; empty for macOS
#                         CUDA builds use sameli/manylinux images with CUDA pre-installed.
#                         Verify available tags at: https://hub.docker.com/u/sameli
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  build:
    name: ${{ matrix.config.package_name }} / ${{ matrix.config.platform }} / ${{ matrix.mpi }}
    runs-on: ${{ matrix.config.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        mpi: ["openmpi", "mpich"]
        config:
          # ── macOS Apple Silicon ──────────────────────────────────────────
          - {package_name: dtfft,         platform: macos-arm64,   os: macos-latest,     extra_features: "",           cupy_package: "",             cibw_archs: arm64,   cibw_image: ""}
          - {package_name: dtfft-fftw,    platform: macos-arm64,   os: macos-latest,     extra_features: "fftw",       cupy_package: "",             cibw_archs: arm64,   cibw_image: ""}
          # ── Linux x86_64 ─────────────────────────────────────────────────
          - {package_name: dtfft,         platform: linux-x86_64,  os: ubuntu-24.04,     extra_features: "",           cupy_package: "",             cibw_archs: x86_64,  cibw_image: "quay.io/pypa/manylinux_2_28_x86_64"}
          - {package_name: dtfft-fftw,    platform: linux-x86_64,  os: ubuntu-24.04,     extra_features: "fftw",       cupy_package: "",             cibw_archs: x86_64,  cibw_image: "quay.io/pypa/manylinux_2_28_x86_64"}
          # - {package_name: dtfft-cuda11x, platform: linux-x86_64,  os: ubuntu-22.04,     extra_features: "cuda,cufft", cupy_package: "cupy-cuda11x", cibw_archs: x86_64,  cibw_image: "sameli/manylinux2014_x86_64_cuda_11.8"}
          - {package_name: dtfft-cuda12x, platform: linux-x86_64,  os: ubuntu-24.04,     extra_features: "cuda,cufft", cupy_package: "cupy-cuda12x", cibw_archs: x86_64,  cibw_image: "sameli/manylinux_2_34_x86_64_cuda_12.9"}
          # - {package_name: dtfft-cuda13x, platform: linux-x86_64,  os: ubuntu-24.04,     extra_features: "cuda,cufft", cupy_package: "cupy-cuda13x", cibw_archs: x86_64,  cibw_image: "sameli/manylinux_2_28_x86_64_cuda_13.2"}
          # ── Linux aarch64 ────────────────────────────────────────────────
          - {package_name: dtfft,         platform: linux-aarch64, os: ubuntu-24.04-arm, extra_features: "",           cupy_package: "",             cibw_archs: aarch64, cibw_image: "quay.io/pypa/manylinux_2_28_aarch64"}
          - {package_name: dtfft-fftw,    platform: linux-aarch64, os: ubuntu-24.04-arm, extra_features: "fftw",       cupy_package: "",             cibw_archs: aarch64, cibw_image: "quay.io/pypa/manylinux_2_28_aarch64"}
          # - {package_name: dtfft-cuda11x, platform: linux-aarch64, os: ubuntu-22.04-arm, extra_features: "cuda,cufft", cupy_package: "cupy-cuda11x", cibw_archs: aarch64, cibw_image: "sameli/manylinux2014_aarch64_cuda_11.8"}
          - {package_name: dtfft-cuda12x, platform: linux-aarch64, os: ubuntu-24.04-arm, extra_features: "cuda,cufft", cupy_package: "cupy-cuda12x", cibw_archs: aarch64, cibw_image: "sameli/manylinux_2_34_aarch64_cuda_12.9"}
          # - {package_name: dtfft-cuda13x, platform: linux-aarch64, os: ubuntu-24.04-arm, extra_features: "cuda,cufft", cupy_package: "cupy-cuda13x", cibw_archs: aarch64, cibw_image: "sameli/manylinux_2_28_aarch64_cuda_13.2"}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ── macOS: install Fortran compiler, MPI, and optional FFTW on the host ──
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install gcc ${{ matrix.mpi }}
          if echo "${{ matrix.config.extra_features }}" | grep -q "fftw"; then
            brew install fftw
          fi
          # Export the full versioned path to gfortran so cibuildwheel can pass it to CMake
          GCC_PREFIX=$(brew --prefix gcc)
          GCC_VER=$(find "$GCC_PREFIX/bin" -name 'gcc-[0-9]*' | sort -V | tail -1 | xargs basename | sed 's/gcc-//')
          echo "GFORTRAN_PATH=$GCC_PREFIX/bin/gfortran-$GCC_VER" >> "$GITHUB_ENV"
          echo "GCC_PATH=$GCC_PREFIX/bin/gcc-$GCC_VER" >> "$GITHUB_ENV"
          echo "GXX_PATH=$GCC_PREFIX/bin/g++-$GCC_VER" >> "$GITHUB_ENV"

      # ── Build wheels (all Python versions) with cibuildwheel ──────────────
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux*"
          CIBW_ARCHS: ${{ matrix.config.cibw_archs }}
          CIBW_MANYLINUX_X86_64_IMAGE: ${{ matrix.config.cibw_image }}
          CIBW_MANYLINUX_AARCH64_IMAGE: ${{ matrix.config.cibw_image }}
          CIBW_BUILD_VERBOSITY: 1

          # Install MPI + optional FFTW inside the Linux container (once per container)
          # manylinux_2_28 = AlmaLinux 8 → dnf; manylinux2014 = CentOS 7 → yum
          # NOTE: CIBW_ENVIRONMENT is NOT available in before_all, so matrix values
          # are substituted directly via GitHub Actions expressions.
          CIBW_BEFORE_ALL_LINUX: |
            if command -v dnf &>/dev/null; then PKG=dnf; else PKG=yum; fi
            if [ "${{ matrix.mpi }}" = "openmpi" ]; then
              $PKG install -y openmpi-devel
            else
              $PKG install -y mpich-devel
            fi
            if echo "${{ matrix.config.extra_features }}" | grep -q "fftw"; then
              $PKG install -y fftw-devel
            fi

          # Environment passed into the Linux container for all hooks and the build
          # $PATH / $LD_LIBRARY_PATH are expanded inside the container at launch time
          CIBW_ENVIRONMENT_LINUX: >-
            MPI_IMPL=${{ matrix.mpi }}
            EXTRA_FEATURES=${{ matrix.config.extra_features }}
            DTFFT_PACKAGE_NAME=${{ matrix.config.package_name }}-${{ matrix.mpi }}
            CUPY_PACKAGE=${{ matrix.config.cupy_package }}
            PATH=/usr/lib64/${{ matrix.mpi }}/bin:/usr/local/cuda/bin:$PATH
            LD_LIBRARY_PATH=/usr/lib64/${{ matrix.mpi }}/lib:/usr/local/cuda/lib64:$LD_LIBRARY_PATH
            CMAKE_ARGS="-DDTFFT_USE_MPI=ON"
            CC=gcc
            CXX=g++
            FC=gfortran

          # Environment on macOS (brew puts MPI binaries in PATH automatically)
          CIBW_ENVIRONMENT_MACOS: >-
            MPI_IMPL=${{ matrix.mpi }}
            EXTRA_FEATURES=${{ matrix.config.extra_features }}
            DTFFT_PACKAGE_NAME=${{ matrix.config.package_name }}-${{ matrix.mpi }}
            CUPY_PACKAGE=${{ matrix.config.cupy_package }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
            PATH=/opt/homebrew/bin:$PATH
            FC=${{ env.GFORTRAN_PATH }}
            CC=${{ env.GCC_PATH }}
            CXX=${{ env.GXX_PATH }}

          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair \
              --exclude libmpi.so.* \
              --exclude libmpi_cxx.so.* \
              --exclude libmpi_mpifh.so.* \
              --exclude libmpi_usempi_ignore_tkr.so.* \
              --exclude libmpi_usempif08.so.* \
              --exclude libgfortran.so.* \
              --exclude libpmpi.so.* \
              --exclude libmpicxx.so.* \
              --exclude libmpifort.so.* \
              --exclude libmpichf90.so.* \
              --exclude libcudart.so.* \
              --exclude libcufft.so.* \
              --exclude libfftw3.so.* \
              --exclude libfftw3f.so.* \
              -w {dest_dir} {wheel}

          CIBW_REPAIR_WHEEL_COMMAND_MACOS: ""

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.config.package_name }}-${{ matrix.config.platform }}-${{ matrix.mpi }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build sdist
        env:
          DTFFT_SDIST: "1"
        run: |
          pip install build
          python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: sdist-dtfft
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist-dtfft
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish_test:
    name: Publish to Test PyPI
    if: github.event_name == 'workflow_dispatch' && inputs.publish_test_pypi
    needs: [build, build_sdist]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist-dtfft
          path: dist/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
